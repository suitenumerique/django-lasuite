services:
  web:
    build:
      context: ..
      dockerfile: demo/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
